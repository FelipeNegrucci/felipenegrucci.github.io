<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Bootstrap Components</title>
</head>
<body>

    <!-- Buttons -->
    <div class="container-fluid">
        <div class="row row-cols-auto gap-4 justify-content-center mt-5">
            <div class="col text-bg-dark hstack gap-3 p-4">
                <button type="button" class="btn btn-accent">Accent</button>
                <button type="button" class="btn btn-primary">Primary</button>
                <button type="button" class="btn btn-secondary">Secondary</button>
            </div>
            <div class="col border text-bg-light hstack gap-3 p-4">
                <button type="button" class="btn btn-accent">Accent</button>
                <button type="button" class="btn btn-primary">Primary</button>
                <button type="button" class="btn btn-secondary">Secondary</button>
            </div>
        </div>
    </div>

    <!-- Navs Links -->
    <div class="container-fluid">
        <div class="row row-cols-auto gap-4 justify-content-center mt-4">
            <nav class="nav bg-light border">
                <a class="nav-link active" aria-current="page" href="#">Active</a>
                <a class="nav-link" href="#">Link</a>
                <a class="nav-link" href="#">Link</a>
                <a class="nav-link disabled">Disabled</a>
            </nav>
        </div>
    </div>

    <!-- Navs Links -->
    <div class="container-fluid">
        <div class="row row-cols-auto gap-4 justify-content-center mt-4">
            <nav class="nav nav-pills border">
                <a class="nav-link active" aria-current="page" href="#">Active</a>
                <a class="nav-link" href="#">Much longer nav link</a>
                <a class="nav-link" href="#">Link</a>
                <a class="nav-link disabled">Disabled</a>
              </nav>
        </div>
    </div>


    <!-- BOOTSTRAP 5.2.3 -->
    <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
